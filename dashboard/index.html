<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Developer Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex">

    <!-- Sidebar -->
    <aside id="sidebar" class="w-56 bg-gray-900 text-gray-100 min-h-screen flex flex-col fixed left-0 top-0 bottom-0 z-10">
        <div class="p-5 border-b border-gray-700">
            <h1 class="text-lg font-bold tracking-tight">Auto Developer</h1>
            <p class="text-xs text-gray-400 mt-1">Pipeline Dashboard</p>
        </div>
        <nav class="flex-1 p-3 space-y-1">
            <a href="#pipelines" class="nav-link flex items-center gap-2 px-3 py-2 rounded-md text-sm hover:bg-gray-800 transition-colors" data-route="pipelines">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                Pipelines
            </a>
            <a href="#trigger" class="nav-link flex items-center gap-2 px-3 py-2 rounded-md text-sm hover:bg-gray-800 transition-colors" data-route="trigger">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                Trigger Pipeline
            </a>
        </nav>
        <div class="p-3 border-t border-gray-700">
            <div id="live-indicator" class="flex items-center gap-2 px-3 py-2 text-xs text-gray-400 cursor-pointer hover:text-gray-200 transition-colors" title="Click to pause/resume auto-refresh">
                <span class="live-dot"></span>
                <span id="live-text">Live</span>
            </div>
        </div>
    </aside>

    <!-- Main content -->
    <main class="ml-56 flex-1 min-h-screen">
        <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>
        <div id="app" class="p-6 max-w-6xl"></div>
    </main>

    <script src="app.js"></script>
</body>
</html>
