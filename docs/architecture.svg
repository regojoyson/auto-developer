<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="620" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="480" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Auto Developer — Phase-Based Pipeline Architecture</text>

  <!-- ═══ Left column: Triggers ═══ -->
  <rect x="30" y="80" width="130" height="45" rx="8" fill="#2563eb" opacity="0.9"/>
  <text x="95" y="100" text-anchor="middle" fill="white" font-weight="600">Jira</text>
  <text x="95" y="115" text-anchor="middle" fill="white" font-size="10">ticket → Ready</text>

  <rect x="30" y="140" width="130" height="45" rx="8" fill="#1f2937"/>
  <text x="95" y="160" text-anchor="middle" fill="white" font-weight="600">GitHub Issues</text>
  <text x="95" y="175" text-anchor="middle" fill="white" font-size="10">issue labeled</text>

  <rect x="30" y="200" width="130" height="45" rx="8" fill="#7c3aed"/>
  <text x="95" y="220" text-anchor="middle" fill="white" font-weight="600">Manual API</text>
  <text x="95" y="235" text-anchor="middle" fill="white" font-size="10">POST /api/trigger</text>

  <!-- Arrows from triggers -->
  <line x1="160" y1="102" x2="210" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="160" y1="162" x2="210" y2="162" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="160" y1="222" x2="210" y2="170" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══ Pipeline Controller (was "Webhook Server") ═══ -->
  <rect x="215" y="100" width="150" height="140" rx="8" fill="#e0f2fe" stroke="#3b82f6" stroke-width="2"/>
  <text x="290" y="125" text-anchor="middle" font-weight="700" fill="#1e40af">Pipeline</text>
  <text x="290" y="143" text-anchor="middle" font-weight="700" fill="#1e40af">Controller</text>
  <text x="290" y="163" text-anchor="middle" font-size="10" fill="#3b82f6">Python server drives</text>
  <text x="290" y="177" text-anchor="middle" font-size="10" fill="#3b82f6">phases one at a time</text>
  <text x="290" y="195" text-anchor="middle" font-size="9" fill="#60a5fa">state transitions</text>
  <text x="290" y="207" text-anchor="middle" font-size="9" fill="#60a5fa">Jira updates</text>
  <text x="290" y="219" text-anchor="middle" font-size="9" fill="#60a5fa">error handling</text>

  <!-- ═══ Phase Pipeline (vertical) ═══ -->
  <!-- Phase 1: Analyze -->
  <rect x="430" y="60" width="175" height="50" rx="8" fill="#e0f2fe" stroke="#0369a1" stroke-width="1.5"/>
  <text x="518" y="82" text-anchor="middle" font-weight="600" fill="#0369a1">1. Analyze</text>
  <text x="518" y="98" text-anchor="middle" font-size="10" fill="#0369a1">read ticket → TICKET.md</text>

  <!-- Phase 2: Plan -->
  <rect x="430" y="125" width="175" height="50" rx="8" fill="#dbeafe" stroke="#1e40af" stroke-width="1.5"/>
  <text x="518" y="147" text-anchor="middle" font-weight="600" fill="#1e40af">2. Plan</text>
  <text x="518" y="163" text-anchor="middle" font-size="10" fill="#1e40af">brainstorm → PLAN.md</text>

  <!-- Phase 3: Implement -->
  <rect x="430" y="190" width="175" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="518" y="212" text-anchor="middle" font-weight="600" fill="#166534">3. Implement</text>
  <text x="518" y="228" text-anchor="middle" font-size="10" fill="#15803d">developer → code + MR</text>

  <!-- Phase arrows -->
  <line x1="518" y1="110" x2="518" y2="123" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="518" y1="175" x2="518" y2="188" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Controller to phases -->
  <line x1="365" y1="135" x2="428" y2="85" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="365" y1="160" x2="428" y2="150" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="365" y1="185" x2="428" y2="215" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- State labels next to phases -->
  <text x="618" y="82" font-size="10" fill="#0369a1" font-style="italic">state: analyzing</text>
  <text x="618" y="147" font-size="10" fill="#1e40af" font-style="italic">state: planning</text>
  <text x="618" y="212" font-size="10" fill="#15803d" font-style="italic">state: developing</text>

  <!-- Issue comment indicators -->
  <rect x="735" y="70" width="90" height="28" rx="4" fill="#2563eb" opacity="0.15"/>
  <text x="780" y="89" text-anchor="middle" font-size="9" fill="#2563eb">Issue comment</text>
  <rect x="735" y="135" width="90" height="28" rx="4" fill="#2563eb" opacity="0.15"/>
  <text x="780" y="154" text-anchor="middle" font-size="9" fill="#2563eb">Issue comment</text>
  <rect x="735" y="200" width="90" height="28" rx="4" fill="#2563eb" opacity="0.15"/>
  <text x="780" y="219" text-anchor="middle" font-size="9" fill="#2563eb">Issue comment</text>

  <line x1="605" y1="85" x2="733" y2="85" stroke="#2563eb" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="605" y1="150" x2="733" y2="150" stroke="#2563eb" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="605" y1="215" x2="733" y2="215" stroke="#2563eb" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ═══ Arrow to PR ═══ -->
  <line x1="518" y1="240" x2="518" y2="278" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- ═══ PR / Review Section ═══ -->
  <rect x="443" y="280" width="150" height="50" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="518" y="302" text-anchor="middle" font-weight="700" fill="#166534">PR / MR</text>
  <text x="518" y="318" text-anchor="middle" font-size="10" fill="#15803d">awaiting-review</text>

  <!-- Human Reviewer -->
  <rect x="680" y="280" width="130" height="50" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="745" y="302" text-anchor="middle" font-weight="600" fill="#991b1b">Human</text>
  <text x="745" y="318" text-anchor="middle" font-size="10" fill="#b91c1c">reviews diff</text>

  <line x1="593" y1="305" x2="678" y2="305" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Three review outcomes -->
  <rect x="715" y="360" width="95" height="38" rx="6" fill="#22c55e"/>
  <text x="762" y="384" text-anchor="middle" fill="white" font-weight="600">Approve</text>

  <rect x="590" y="360" width="100" height="38" rx="6" fill="#f97316"/>
  <text x="640" y="384" text-anchor="middle" fill="white" font-weight="600">Feedback</text>

  <line x1="755" y1="330" x2="762" y2="358" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="725" y1="330" x2="650" y2="358" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- Approve → Done -->
  <rect x="730" y="418" width="70" height="32" rx="6" fill="#166534"/>
  <text x="765" y="439" text-anchor="middle" fill="white" font-weight="600">Done</text>
  <line x1="762" y1="398" x2="762" y2="416" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="762" y="465" text-anchor="middle" font-size="9" fill="#166534" font-style="italic">state: merged</text>

  <!-- Feedback → Rework pipeline -->
  <rect x="443" y="360" width="120" height="38" rx="6" fill="#fed7aa" stroke="#f97316" stroke-width="1"/>
  <text x="503" y="376" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412">Feedback</text>
  <text x="503" y="390" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412">Parser</text>

  <line x1="588" y1="379" x2="565" y2="379" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- Rework developer -->
  <rect x="443" y="415" width="120" height="38" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="503" y="432" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Developer</text>
  <text x="503" y="446" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Rework</text>

  <line x1="503" y1="398" x2="503" y2="413" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- Loop arrow back to PR -->
  <path d="M 443 434 L 410 434 L 410 305 L 441 305" fill="none" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)" stroke-dasharray="5,3"/>
  <text x="390" y="375" text-anchor="middle" fill="#f97316" font-size="9" font-weight="600" transform="rotate(-90, 390, 375)">updates PR</text>

  <!-- Rework state label -->
  <text x="503" y="468" text-anchor="middle" font-size="9" fill="#9a3412" font-style="italic">state: reworking</text>

  <!-- ═══ Failed state ═══ -->
  <rect x="215" y="290" width="130" height="45" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="280" y="310" text-anchor="middle" font-weight="700" fill="#991b1b">Failed</text>
  <text x="280" y="325" text-anchor="middle" font-size="10" fill="#b91c1c">error stored in state</text>

  <!-- Dashed lines from phases to failed -->
  <path d="M 430 100 L 345 290" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <path d="M 430 165 L 345 290" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3"/>
  <path d="M 430 230 L 345 295" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ═══ Right side: Providers ═══ -->
  <rect x="840" y="70" width="100" height="38" rx="6" fill="#f3f4f6" stroke="#6b7280" stroke-width="1"/>
  <text x="890" y="85" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Git Provider</text>
  <text x="890" y="100" text-anchor="middle" font-size="9" fill="#6b7280">GitLab / GitHub</text>

  <rect x="840" y="120" width="100" height="38" rx="6" fill="#f3f4f6" stroke="#6b7280" stroke-width="1"/>
  <text x="890" y="135" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">CLI Adapter</text>
  <text x="890" y="150" text-anchor="middle" font-size="9" fill="#6b7280">Claude / Codex</text>

  <rect x="840" y="170" width="100" height="38" rx="6" fill="#f3f4f6" stroke="#6b7280" stroke-width="1"/>
  <text x="890" y="185" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Slack</text>
  <text x="890" y="200" text-anchor="middle" font-size="9" fill="#6b7280">notifications</text>

  <text x="890" y="224" text-anchor="middle" font-size="9" fill="#9ca3af" font-style="italic">All providers pluggable</text>

  <!-- ═══ State tracking box ═══ -->
  <rect x="30" y="310" width="160" height="100" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="110" y="332" text-anchor="middle" font-weight="600" fill="#6b21a8">State Tracking</text>
  <text x="110" y="352" text-anchor="middle" font-size="10" fill="#7c3aed">.pipeline-state/*.json</text>
  <text x="110" y="370" text-anchor="middle" font-size="9" fill="#8b5cf6">phase history + timing</text>
  <text x="110" y="384" text-anchor="middle" font-size="9" fill="#8b5cf6">artifacts (MR URLs)</text>
  <text x="110" y="398" text-anchor="middle" font-size="9" fill="#8b5cf6">error details</text>

  <!-- Arrow from controller to state -->
  <line x1="290" y1="240" x2="140" y2="308" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)" stroke-dasharray="4,3"/>

  <!-- ═══ Legend ═══ -->
  <rect x="30" y="530" width="900" height="75" rx="6" fill="white" stroke="#e5e7eb"/>
  <text x="50" y="552" font-size="11" font-weight="600" fill="#374151">Legend</text>

  <rect x="50" y="563" width="12" height="12" rx="2" fill="#3b82f6"/>
  <text x="68" y="574" font-size="11" fill="#555">Pipeline controller</text>

  <rect x="200" y="563" width="12" height="12" rx="2" fill="#0369a1"/>
  <text x="218" y="574" font-size="11" fill="#555">Analyze phase</text>

  <rect x="330" y="563" width="12" height="12" rx="2" fill="#1e40af"/>
  <text x="348" y="574" font-size="11" fill="#555">Plan phase</text>

  <rect x="440" y="563" width="12" height="12" rx="2" fill="#22c55e"/>
  <text x="458" y="574" font-size="11" fill="#555">Implement / Approve</text>

  <rect x="590" y="563" width="12" height="12" rx="2" fill="#f97316"/>
  <text x="608" y="574" font-size="11" fill="#555">Feedback / Rework loop</text>

  <rect x="770" y="563" width="12" height="12" rx="2" fill="#ef4444"/>
  <text x="788" y="574" font-size="11" fill="#555">Failed state</text>

  <!-- ═══ State flow at bottom ═══ -->
  <text x="480" y="505" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">State Flow:</text>
  <text x="480" y="520" text-anchor="middle" font-size="11" fill="#555">analyzing → planning → developing → awaiting-review → merged | failed</text>
  <text x="480" y="535" text-anchor="middle" font-size="10" fill="#a16207" font-style="italic">(analyze/plan can emit “blocked” — resumes on new Jira comment)</text>
</svg>
