<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 280" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="750" height="280" fill="#fafafa" rx="8"/>

  <text x="375" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Pluggable Providers — swap via config.yaml</text>

  <!-- Issue Tracker column -->
  <rect x="30" y="55" width="160" height="30" rx="5" fill="#2563eb"/>
  <text x="110" y="75" text-anchor="middle" fill="white" font-weight="600" font-size="12">Issue Tracker</text>
  <rect x="30" y="95" width="160" height="35" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="110" y="118" text-anchor="middle" fill="#1e40af" font-size="12">Jira</text>
  <rect x="30" y="138" width="160" height="35" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="110" y="161" text-anchor="middle" fill="#1e40af" font-size="12">GitHub Issues</text>
  <rect x="30" y="181" width="160" height="35" rx="6" fill="#f0f0f0" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="110" y="204" text-anchor="middle" fill="#9ca3af" font-size="12">+ Your own</text>

  <!-- Git Provider column -->
  <rect x="210" y="55" width="160" height="30" rx="5" fill="#059669"/>
  <text x="290" y="75" text-anchor="middle" fill="white" font-weight="600" font-size="12">Git Provider</text>
  <rect x="210" y="95" width="160" height="35" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="290" y="118" text-anchor="middle" fill="#166534" font-size="12">GitLab</text>
  <rect x="210" y="138" width="160" height="35" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="290" y="161" text-anchor="middle" fill="#166534" font-size="12">GitHub</text>
  <rect x="210" y="181" width="160" height="35" rx="6" fill="#f0f0f0" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="290" y="204" text-anchor="middle" fill="#9ca3af" font-size="12">+ Your own</text>

  <!-- CLI Adapter column -->
  <rect x="390" y="55" width="160" height="30" rx="5" fill="#7c3aed"/>
  <text x="470" y="75" text-anchor="middle" fill="white" font-weight="600" font-size="12">AI Coding CLI</text>
  <rect x="390" y="95" width="160" height="35" rx="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="470" y="118" text-anchor="middle" fill="#5b21b6" font-size="12">Claude Code</text>
  <rect x="390" y="138" width="160" height="35" rx="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="470" y="161" text-anchor="middle" fill="#5b21b6" font-size="12">Codex</text>
  <rect x="390" y="181" width="160" height="35" rx="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="470" y="204" text-anchor="middle" fill="#5b21b6" font-size="12">Gemini</text>

  <!-- Notification column -->
  <rect x="570" y="55" width="150" height="30" rx="5" fill="#f97316"/>
  <text x="645" y="75" text-anchor="middle" fill="white" font-weight="600" font-size="12">Notifications</text>
  <rect x="570" y="95" width="150" height="35" rx="6" fill="#fed7aa" stroke="#fdba74" stroke-width="1"/>
  <text x="645" y="118" text-anchor="middle" fill="#9a3412" font-size="12">Slack</text>
  <rect x="570" y="138" width="150" height="35" rx="6" fill="#f0f0f0" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="645" y="161" text-anchor="middle" fill="#9ca3af" font-size="12">+ Your own</text>
  <rect x="570" y="181" width="150" height="35" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="645" y="200" text-anchor="middle" fill="#b45309" font-size="11" font-style="italic">optional</text>

  <!-- Bottom bar -->
  <rect x="30" y="235" width="690" height="32" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="375" y="256" text-anchor="middle" fill="#64748b" font-size="12">All providers implement a base class interface — add your own in minutes</text>
</svg>
