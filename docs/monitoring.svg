<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <defs>
    <marker id="marr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <rect width="700" height="300" fill="#fafafa" rx="8"/>
  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Monitoring — Real-time Agent Visibility</text>

  <!-- Agent process -->
  <rect x="40" y="70" width="150" height="90" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="115" y="95" text-anchor="middle" font-weight="700" fill="#1e40af">Agent Process</text>
  <text x="115" y="115" text-anchor="middle" font-size="10" fill="#3b82f6">orchestrator</text>
  <text x="115" y="130" text-anchor="middle" font-size="10" fill="#3b82f6">brainstorm</text>
  <text x="115" y="145" text-anchor="middle" font-size="10" fill="#3b82f6">developer</text>

  <!-- Arrow to handler registry -->
  <line x1="190" y1="115" x2="245" y2="115" stroke="#555" stroke-width="1.5" marker-end="url(#marr)"/>
  <text x="218" y="107" text-anchor="middle" font-size="9" fill="#999">stdout</text>
  <text x="218" y="130" text-anchor="middle" font-size="9" fill="#999">stderr</text>

  <!-- Output Handler Registry -->
  <rect x="250" y="80" width="160" height="70" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="330" y="105" text-anchor="middle" font-weight="600" fill="#475569">Output Handler</text>
  <text x="330" y="122" text-anchor="middle" font-weight="600" fill="#475569">Registry</text>
  <text x="330" y="140" text-anchor="middle" font-size="10" fill="#94a3b8">fans out to all handlers</text>

  <!-- Arrow to File Handler -->
  <line x1="410" y1="100" x2="470" y2="80" stroke="#555" stroke-width="1.5" marker-end="url(#marr)"/>

  <!-- Arrow to Memory Handler -->
  <line x1="410" y1="130" x2="470" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#marr)"/>

  <!-- File Handler -->
  <rect x="475" y="55" width="190" height="55" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="570" y="77" text-anchor="middle" font-weight="600" fill="#92400e">File Handler</text>
  <text x="570" y="97" text-anchor="middle" font-size="10" fill="#b45309">logs/agents/{key}-{agent}.log</text>

  <!-- Memory Handler -->
  <rect x="475" y="130" width="190" height="55" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="570" y="152" text-anchor="middle" font-weight="600" fill="#5b21b6">Memory Handler</text>
  <text x="570" y="172" text-anchor="middle" font-size="10" fill="#7c3aed">in-memory buffer for API</text>

  <!-- How to access -->
  <rect x="40" y="195" width="280" height="90" rx="8" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="55" y="218" font-size="12" font-weight="600" fill="#374151">How to watch:</text>
  <text x="55" y="240" font-size="11" fill="#555" font-family="monospace">tail -f logs/agents/EV-14942-orchestrator.log</text>
  <text x="55" y="260" font-size="11" fill="#555" font-family="monospace">curl localhost:3000/api/status/EV-14942/logs</text>
  <text x="55" y="275" font-size="10" fill="#94a3b8">Both stream in real-time as the agent works</text>

  <!-- Config -->
  <rect x="345" y="205" width="320" height="70" rx="8" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="360" y="228" font-size="12" font-weight="600" fill="#374151">config.yaml:</text>
  <text x="360" y="248" font-size="11" fill="#555" font-family="monospace">pipeline:</text>
  <text x="360" y="263" font-size="11" fill="#555" font-family="monospace">  outputHandlers: [file, memory]</text>
</svg>
